schema_version: '1.0'
module:
  name: def-pyirstdmetrics
  version: 0.1.0
  display_name: DEF-pyirstdmetrics
  description: >-
    Standardized IRSTD evaluation toolkit — pixel-level (IoU, nIoU, F1),
    target-level (PD/FA via OPDC matching), and hybrid-level (hIoU with
    hierarchical error decomposition) metrics.
  category: defense.evaluation
  license: Apache-2.0
  paper: "Rethinking Evaluation of Infrared Small Target Detection (NeurIPS 2025)"
  arxiv: "2509.16888"
  module_type: evaluation
  domain: irstd

capabilities:
  provides:
    - type: evaluation
      subtype: irstd_metrics
    - type: evaluation
      subtype: pixel_level
    - type: evaluation
      subtype: target_level
    - type: evaluation
      subtype: hybrid_hiou
    - type: report
      subtype: benchmark_comparison

interface:
  inputs:
    - name: pred_dir
      type: path
      description: Directory with prediction images
    - name: mask_dir
      type: path
      description: Directory with ground-truth masks
  outputs:
    - name: metrics_json
      type: json
      description: Full metric hierarchy with provenance

hardware:
  platforms:
    - name: x86_64
      backends: [cpu]
    - name: aarch64
      backends: [cpu]
  gpu_required: false

service:
  entrypoint: anima_pyirstdmetrics.serve:app
  port: 8710
  health_endpoint: /health
  ready_endpoint: /ready
  predict_endpoint: /predict
  info_endpoint: /info

docker:
  image: ghcr.io/robotflow-labs/anima-def-pyirstdmetrics:0.1.0
  dockerfile: Dockerfile.serve
  compose: docker-compose.serve.yml
  port: 8710

ros2:
  node_name: irstd_metrics_node
  launch_file: launch/irstd_metrics.launch.py
  topics:
    subscribe:
      - name: /irstd_eval/request
        type: std_msgs/String
    publish:
      - name: /irstd_eval/result
        type: std_msgs/String

composability:
  pairs_well_with:
    - def-dhif
  conflicts_with: []

safety:
  failure_mode: returns_error
  timeout_ms: 30000
  health_topic: /anima/def_pyirstdmetrics/health
