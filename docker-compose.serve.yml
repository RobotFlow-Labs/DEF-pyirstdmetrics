services:
  def-pyirstdmetrics:
    build:
      context: .
      dockerfile: Dockerfile.serve
    ports:
      - "${ANIMA_SERVE_PORT:-8710}:${ANIMA_SERVE_PORT:-8710}"
    env_file:
      - .env.serve
    volumes:
      - /mnt/forge-data/datasets:/data/datasets:ro
      - /mnt/artifacts-datai/reports:/data/reports
    restart: unless-stopped
    profiles:
      - serve
      - api

  ros2:
    build:
      context: .
      dockerfile: Dockerfile.serve
    env_file:
      - .env.serve
    network_mode: host
    command: >
      python -c "from anima_pyirstdmetrics.ros2_node import create_node;
      n = create_node(); n.spin()"
    profiles:
      - ros2

  test:
    build:
      context: .
      dockerfile: Dockerfile.serve
    command: python -m pytest tests/ -v --tb=short
    volumes:
      - ./tests:/app/tests:ro
      - ./repositories:/app/repositories:ro
    profiles:
      - test
